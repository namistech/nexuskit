<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexusKit — Dashboard</title>

<!--
  NOTE ON PRODUCTION HARDENING:
  This uses the Tailwind Play CDN for MVP velocity (matches the brief's
  "lightweight, avoid bulky frameworks" directive). Before scaling traffic,
  swap this for a compiled Tailwind build (CLI or PostCSS) — Tailwind's own
  docs advise against the Play CDN in production because it compiles
  utility classes client-side on every load.
-->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.14.1/cdn.min.js" defer></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          warm: {
            50: '#FAF8F5',
            100: '#F3EEE7',
            200: '#E7DDD1',
            300: '#D6C6B3',
          },
          accent: {
            500: '#C2703D',
            600: '#A85A2C',
            700: '#8A481F',
          },
          ink: {
            700: '#44403C',
            800: '#33302C',
            900: '#211F1B',
          },
        },
        fontFamily: {
          sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Inter', 'sans-serif'],
        },
      },
    },
  };
</script>
</head>
<body class="bg-warm-50 text-ink-800 font-sans antialiased">

<div x-data="nexusDashboard()" x-init="init()" class="min-h-screen">

  <!-- ============================== HEADER ============================== -->
  <header class="sticky top-0 z-40 bg-warm-50/90 backdrop-blur border-b border-warm-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-accent-500 flex items-center justify-center text-white font-bold text-sm">N</div>
        <span class="font-semibold text-ink-900 text-lg">NexusKit</span>
        <span class="hidden sm:inline-block ml-2 text-[11px] font-medium uppercase tracking-wide text-accent-700 bg-accent-500/10 px-2 py-0.5 rounded-full"
              x-text="tenant.billingTier"></span>
      </div>

      <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-ink-700">
        <a href="#overview" class="hover:text-accent-600">Overview</a>
        <a href="#campaigns" class="hover:text-accent-600">Campaigns</a>
        <a href="#connections" class="hover:text-accent-600">Connections</a>
      </nav>

      <div class="flex items-center gap-3">
        <button @click="showNewCampaignModal = true"
                class="hidden sm:inline-flex items-center gap-1.5 bg-accent-500 hover:bg-accent-600 text-white text-sm font-semibold px-4 py-2 rounded-xl shadow-sm transition-colors">
          <span class="text-lg leading-none">+</span> New Campaign
        </button>
        <div class="w-9 h-9 rounded-full bg-warm-200 flex items-center justify-center text-sm font-semibold text-ink-700"
             x-text="tenant.userInitials"></div>
      </div>
    </div>
  </header>

  <!-- Mobile primary CTA — kept above the fold per spec -->
  <div class="md:hidden px-4 pt-4">
    <button @click="showNewCampaignModal = true"
            class="w-full flex items-center justify-center gap-1.5 bg-accent-500 hover:bg-accent-600 text-white text-sm font-semibold px-4 py-3 rounded-xl shadow-sm">
      <span class="text-lg leading-none">+</span> New Campaign
    </button>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-10">

    <!-- ============================== STAT CARDS ============================== -->
    <section id="overview">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <template x-for="stat in stats" :key="stat.label">
          <div class="bg-white rounded-2xl border border-warm-200 p-4 sm:p-5 shadow-sm">
            <p class="text-xs font-medium text-ink-700/70 uppercase tracking-wide" x-text="stat.label"></p>
            <p class="mt-1.5 text-2xl sm:text-3xl font-bold text-ink-900" x-text="stat.value"></p>
            <p class="mt-1 text-xs font-medium" :class="stat.deltaPositive ? 'text-emerald-600' : 'text-ink-700/60'">
              <span x-text="stat.delta"></span>
            </p>
          </div>
        </template>
      </div>
    </section>

    <!-- ============================== CONNECTIONS ============================== -->
    <section id="connections">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-base font-semibold text-ink-900">Connected accounts</h2>
        <span class="text-xs text-ink-700/60" x-text="connections.filter(c => c.connected).length + ' of ' + connections.length + ' active'"></span>
      </div>

      <div class="grid sm:grid-cols-2 gap-3 sm:gap-4">
        <template x-for="conn in connections" :key="conn.id">
          <div class="bg-white rounded-2xl border border-warm-200 p-4 sm:p-5 shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-semibold text-sm"
                   :class="conn.platform === 'instagram' ? 'bg-gradient-to-br from-amber-500 via-accent-500 to-rose-500' : 'bg-blue-600'">
                <span x-text="conn.platform === 'instagram' ? 'IG' : 'FB'"></span>
              </div>
              <div>
                <p class="text-sm font-semibold text-ink-900" x-text="conn.label"></p>
                <p class="text-xs text-ink-700/60">
                  <span x-show="conn.connected" x-text="'@' + conn.handle"></span>
                  <span x-show="!conn.connected">Not connected</span>
                </p>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full" :class="conn.connected ? 'bg-emerald-500' : 'bg-ink-700/30'"></span>
              <button @click="toggleConnection(conn.id)"
                      class="text-xs font-semibold px-3 py-1.5 rounded-lg border transition-colors"
                      :class="conn.connected
                        ? 'border-warm-300 text-ink-700 hover:bg-warm-100'
                        : 'border-accent-500 text-accent-600 hover:bg-accent-500/10'"
                      x-text="conn.connected ? 'Disconnect' : 'Connect'">
              </button>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- ============================== CAMPAIGNS ============================== -->
    <section id="campaigns">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-base font-semibold text-ink-900">Campaigns</h2>
        <button @click="showNewCampaignModal = true"
                class="text-xs font-semibold text-accent-600 hover:text-accent-700">
          + Add campaign
        </button>
      </div>

      <div class="bg-white rounded-2xl border border-warm-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-xs font-semibold text-ink-700/60 uppercase tracking-wide border-b border-warm-200">
                <th class="px-4 sm:px-5 py-3">Campaign</th>
                <th class="px-4 sm:px-5 py-3">Keywords</th>
                <th class="px-4 sm:px-5 py-3">Triggers</th>
                <th class="px-4 sm:px-5 py-3">DMs sent</th>
                <th class="px-4 sm:px-5 py-3">Status</th>
                <th class="px-4 sm:px-5 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="campaign in campaigns" :key="campaign.id">
                <tr class="border-b border-warm-100 last:border-0 hover:bg-warm-50/70">
                  <td class="px-4 sm:px-5 py-3.5">
                    <p class="font-medium text-ink-900" x-text="campaign.name"></p>
                    <p class="text-xs text-ink-700/60 truncate max-w-[220px]" x-text="campaign.dmMessageText"></p>
                  </td>
                  <td class="px-4 sm:px-5 py-3.5">
                    <div class="flex flex-wrap gap-1">
                      <template x-for="kw in campaign.triggerKeywords" :key="kw">
                        <span class="text-[11px] font-medium bg-warm-100 text-ink-700 px-2 py-0.5 rounded-full" x-text="kw"></span>
                      </template>
                    </div>
                  </td>
                  <td class="px-4 sm:px-5 py-3.5 font-medium text-ink-900" x-text="campaign.totalTriggers.toLocaleString()"></td>
                  <td class="px-4 sm:px-5 py-3.5 font-medium text-ink-900" x-text="campaign.totalDmsSent.toLocaleString()"></td>
                  <td class="px-4 sm:px-5 py-3.5">
                    <button @click="campaign.isActive = !campaign.isActive"
                            class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors"
                            :class="campaign.isActive ? 'bg-emerald-500' : 'bg-ink-700/20'">
                      <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
                            :class="campaign.isActive ? 'translate-x-4' : 'translate-x-1'"></span>
                    </button>
                  </td>
                  <td class="px-4 sm:px-5 py-3.5 text-right">
                    <button @click="editCampaign(campaign)" class="text-xs font-semibold text-accent-600 hover:text-accent-700">Edit</button>
                  </td>
                </tr>
              </template>
              <tr x-show="campaigns.length === 0">
                <td colspan="6" class="px-4 sm:px-5 py-10 text-center text-sm text-ink-700/60">
                  No campaigns yet — create your first comment-to-DM trigger.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================== NEW / EDIT CAMPAIGN MODAL ============================== -->
  <div x-show="showNewCampaignModal"
       x-cloak
       class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-ink-900/40 backdrop-blur-sm p-0 sm:p-4"
       @keydown.escape.window="showNewCampaignModal = false">
    <div @click.outside="showNewCampaignModal = false"
         class="bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl shadow-xl p-5 sm:p-6 max-h-[90vh] overflow-y-auto">

      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-semibold text-ink-900" x-text="editingCampaign ? 'Edit campaign' : 'New campaign'"></h3>
        <button @click="showNewCampaignModal = false" class="text-ink-700/50 hover:text-ink-900">✕</button>
      </div>

      <form @submit.prevent="saveCampaign()" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-ink-700 uppercase tracking-wide">Campaign name</label>
          <input type="text" x-model="form.name" required
                 class="mt-1 w-full rounded-xl border border-warm-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500" />
        </div>

        <div>
          <label class="text-xs font-semibold text-ink-700 uppercase tracking-wide">Trigger keywords</label>
          <input type="text" x-model="form.triggerKeywordsRaw" placeholder="link, info, price (comma-separated)" required
                 class="mt-1 w-full rounded-xl border border-warm-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500" />
          <p class="mt-1 text-[11px] text-ink-700/50">Matches when a comment contains any of these words.</p>
        </div>

        <div>
          <label class="text-xs font-semibold text-ink-700 uppercase tracking-wide">DM message</label>
          <textarea x-model="form.dmMessageText" rows="3" required
                    class="mt-1 w-full rounded-xl border border-warm-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500"></textarea>
        </div>

        <div>
          <label class="text-xs font-semibold text-ink-700 uppercase tracking-wide">Redirect URL (optional)</label>
          <input type="url" x-model="form.redirectUrl" placeholder="https://yourstore.com/offer"
                 class="mt-1 w-full rounded-xl border border-warm-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500" />
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" @click="showNewCampaignModal = false"
                  class="flex-1 text-sm font-semibold px-4 py-2.5 rounded-xl border border-warm-300 text-ink-700 hover:bg-warm-100">
            Cancel
          </button>
          <button type="submit"
                  class="flex-1 text-sm font-semibold px-4 py-2.5 rounded-xl bg-accent-500 hover:bg-accent-600 text-white shadow-sm">
            Save campaign
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
  function nexusDashboard() {
    return {
      showNewCampaignModal: false,
      editingCampaign: null,
      tenant: {
        billingTier: 'Trial',
        userInitials: 'AB',
      },

      // --- MOCK DATA -----------------------------------------------------
      // This dashboard renders standalone against these local arrays so it
      // can be reviewed before the API layer exists. Wire it up by replacing
      // init() below with fetch() calls against endpoints such as:
      //   GET  /api/stats
      //   GET  /api/connections
      //   GET  /api/campaigns
      //   POST /api/campaigns
      // Those routes are NOT part of this deployment phase (only the Meta
      // webhook ingestion route in server.js is) — build them next against
      // the same tenant-scoped `withTenant()` pattern used there.
      // ---------------------------------------------------------------------
      stats: [
        { label: 'Active keywords', value: '12', delta: '+3 this week', deltaPositive: true },
        { label: 'DMs sent today', value: '184', delta: '+22% vs yesterday', deltaPositive: true },
        { label: 'Comment → DM rate', value: '94.2%', delta: 'within Meta pacing limits', deltaPositive: true },
        { label: 'Connected accounts', value: '1', delta: '1 pending setup', deltaPositive: false },
      ],
      connections: [
        { id: 'conn_ig_1', platform: 'instagram', label: 'Instagram Business', handle: 'nexuskit.demo', connected: true },
        { id: 'conn_fb_1', platform: 'facebook', label: 'Facebook Page', handle: '', connected: false },
      ],
      campaigns: [
        {
          id: 'camp_1',
          name: 'Free Guide Giveaway',
          triggerKeywords: ['guide', 'link', 'send'],
          dmMessageText: 'Here\'s your free guide! Tap below to grab it 👇',
          redirectUrl: 'https://example.com/guide',
          isActive: true,
          totalTriggers: 1042,
          totalDmsSent: 981,
        },
        {
          id: 'camp_2',
          name: 'Pricing Inquiry',
          triggerKeywords: ['price', 'cost', 'how much'],
          dmMessageText: 'Thanks for asking! Full pricing is right here 👇',
          redirectUrl: 'https://example.com/pricing',
          isActive: true,
          totalTriggers: 356,
          totalDmsSent: 340,
        },
        {
          id: 'camp_3',
          name: 'Restock Alert Signup',
          triggerKeywords: ['restock', 'notify'],
          dmMessageText: 'You\'re on the list — we\'ll DM you the second it\'s back.',
          redirectUrl: '',
          isActive: false,
          totalTriggers: 88,
          totalDmsSent: 60,
        },
      ],
      form: { name: '', triggerKeywordsRaw: '', dmMessageText: '', redirectUrl: '' },

      init() {
        // Placeholder for wiring real API calls in, e.g.:
        // fetch('/api/campaigns').then(r => r.json()).then(data => this.campaigns = data);
      },

      toggleConnection(id) {
        const conn = this.connections.find((c) => c.id === id);
        if (!conn) return;
        // Real implementation: redirect into Meta's OAuth dialog for connect,
        // or call DELETE /api/connections/:id for disconnect.
        conn.connected = !conn.connected;
      },

      editCampaign(campaign) {
        this.editingCampaign = campaign;
        this.form = {
          name: campaign.name,
          triggerKeywordsRaw: campaign.triggerKeywords.join(', '),
          dmMessageText: campaign.dmMessageText,
          redirectUrl: campaign.redirectUrl,
        };
        this.showNewCampaignModal = true;
      },

      saveCampaign() {
        const keywords = this.form.triggerKeywordsRaw
          .split(',')
          .map((k) => k.trim().toLowerCase())
          .filter(Boolean);

        if (this.editingCampaign) {
          Object.assign(this.editingCampaign, {
            name: this.form.name,
            triggerKeywords: keywords,
            dmMessageText: this.form.dmMessageText,
            redirectUrl: this.form.redirectUrl,
          });
        } else {
          this.campaigns.unshift({
            id: 'camp_' + Date.now(),
            name: this.form.name,
            triggerKeywords: keywords,
            dmMessageText: this.form.dmMessageText,
            redirectUrl: this.form.redirectUrl,
            isActive: true,
            totalTriggers: 0,
            totalDmsSent: 0,
          });
        }

        this.editingCampaign = null;
        this.form = { name: '', triggerKeywordsRaw: '', dmMessageText: '', redirectUrl: '' };
        this.showNewCampaignModal = false;
      },
    };
  }
</script>

</body>
</html>
